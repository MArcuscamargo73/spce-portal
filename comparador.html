<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPCE — Comparador</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f7f5;
  --green:#16a34a;--green2:#15803d;--green3:#dcfce7;--green4:#bbf7d0;--greenbright:#22c55e;
  --text:#0a1a0f;--text2:#2d5a3a;--text3:#7a9e82;
  --border:#d4e8d8;
  --red:#dc2626;--amber:#d97706;
  --fh:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 10% 0%,rgba(34,197,94,.08) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%,rgba(45,212,191,.06) 0%,transparent 60%);
  font-family:var(--fh);
  display:flex;flex-direction:column;
}

/* ── SLIDE ENGINE ─────────────────────────────────── */
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;transform:translateX(60px);
  transition:opacity .4s ease,transform .4s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateX(-60px)}

/* ── SLIDE CAPA ───────────────────────────────────── */
.capa{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;text-align:center;gap:1.5rem;
}
.capa-vs{
  font-family:var(--fh);font-size:1rem;font-weight:700;
  color:var(--text3);letter-spacing:.3em;text-transform:uppercase;
}
.capa-carros{
  display:flex;align-items:flex-end;justify-content:center;gap:0;width:100%;max-width:900px;
}
.capa-carro{flex:1;display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:0 1rem}
.capa-foto{width:100%;max-width:340px;height:180px;object-fit:contain;filter:drop-shadow(0 8px 24px rgba(0,0,0,.12))}
.capa-foto-ph{width:280px;height:180px;background:var(--green3);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:3rem;font-weight:900;color:var(--green2)}
.capa-marca{font-family:var(--fm);font-size:.7rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.capa-modelo{font-family:var(--fh);font-size:1.6rem;font-weight:900;color:var(--text);letter-spacing:-.03em;line-height:1}
.capa-versao{font-size:.85rem;color:var(--text3);font-weight:400}
.capa-preco{font-family:var(--fh);font-size:1.1rem;font-weight:700;color:var(--green);margin-top:.2rem}
.vs-divider{display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:0 1rem;flex-shrink:0}
.vs-text{font-family:var(--fh);font-size:2rem;font-weight:900;color:var(--green);letter-spacing:-.04em}
.capa-titulo{font-family:var(--fh);font-size:1.1rem;font-weight:500;color:var(--text2);max-width:600px;line-height:1.4}
.capa-hint{font-family:var(--fm);font-size:.7rem;color:var(--text3);display:flex;align-items:center;gap:.5rem}
.kbd{background:#fff;border:1px solid var(--border);border-radius:5px;padding:.15rem .4rem;font-size:.65rem}

/* ── SLIDE CRITÉRIO ───────────────────────────────── */
.criterio-slide{
  flex:1;display:grid;
  grid-template-rows:auto 1fr auto;
}

/* Header com fotos */
.crit-header{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);
  background:#fff;
  flex-shrink:0;
}
.crit-car{
  flex:1;display:flex;align-items:center;gap:1rem;
  padding:.75rem 1.5rem;border-right:1px solid var(--border);
}
.crit-car:last-child{border-right:none}
.crit-car-foto{height:60px;width:110px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.1))}
.crit-car-foto-ph{height:60px;width:110px;background:var(--green3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:1.4rem;font-weight:900;color:var(--green2);flex-shrink:0}
.crit-car-info{flex:1;min-width:0}
.crit-car-marca{font-family:var(--fm);font-size:.62rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.crit-car-nome{font-family:var(--fh);font-size:1rem;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1.1}
.crit-car-ver{font-size:.75rem;color:var(--text2)}
.crit-car-pts{flex-shrink:0;background:var(--green3);border:1px solid var(--green4);border-radius:100px;padding:.2rem .6rem;font-family:var(--fm);font-size:.68rem;font-weight:500;color:var(--green)}

/* Corpo principal */
.crit-body{
  display:flex;align-items:stretch;overflow:hidden;
}

/* Painel lateral esquerdo — critério */
.crit-painel{
  width:200px;flex-shrink:0;
  background:linear-gradient(160deg,var(--green) 0%,var(--green2) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem 1rem;text-align:center;gap:.75rem;
  border-right:none;
}
.crit-painel-num{
  font-family:var(--fm);font-size:.65rem;font-weight:700;
  color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;
}
.crit-painel-icone{font-size:2.5rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))}
.crit-painel-nome{
  font-family:var(--fh);font-size:1rem;font-weight:800;
  color:#fff;letter-spacing:-.02em;line-height:1.2;text-transform:uppercase;
}
.crit-painel-desc{font-size:.72rem;color:rgba(255,255,255,.7);line-height:1.4}

/* Dados dos carros */
.crit-dados{
  flex:1;display:grid;
  border-right:1px solid var(--border);
}
.crit-dados:last-child{border-right:none}
.crit-dado-col{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1rem 1.5rem;gap:.5rem;
  border-right:1px solid var(--border);
  overflow-y:auto;
}
.crit-dado-col:last-child{border-right:none}
.crit-dado-col.vencedor{background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(34,197,94,.02))}

/* Itens de dado */
.dado-item{width:100%;text-align:center;padding:.3rem 0}
.dado-val{
  font-family:var(--fh);font-size:3.5rem;font-weight:900;
  color:var(--text);letter-spacing:-.04em;line-height:1;
  transition:color .3s;
}
.dado-val.destaque{color:var(--green)}
.dado-val.pior{color:var(--red)}
.dado-val.txt{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
.dado-val.pequeno{font-size:2rem}
.dado-unid{
  font-family:var(--fm);font-size:.72rem;font-weight:500;
  color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:.1rem;
}
.dado-label{font-size:.7rem;color:var(--text3);margin-top:.15rem}
.dado-sep{width:40px;height:1px;background:var(--border);margin:.4rem auto}

/* Badge vencedor */
.badge-venc{
  display:inline-flex;align-items:center;gap:.3rem;
  background:var(--green);color:#fff;
  font-family:var(--fm);font-size:.62rem;font-weight:600;
  padding:.2rem .55rem;border-radius:100px;margin-top:.5rem;
  letter-spacing:.04em;
}

/* ── SLIDE PLACAR FINAL ───────────────────────────── */
.placar-slide{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;gap:2rem;
}
.placar-titulo{font-family:var(--fm);font-size:.75rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.placar-carros{display:flex;align-items:flex-end;gap:3rem;justify-content:center}
.placar-carro{display:flex;flex-direction:column;align-items:center;gap:.75rem;transition:all .5s}
.placar-foto-wrap{border-radius:16px;overflow:hidden;border:2px solid var(--border);background:#fff}
.placar-foto-wrap img{display:block;width:100%;height:100%;object-fit:contain}
.placar-foto-ph{display:flex;align-items:center;justify-content:center;background:var(--green3);font-family:var(--fh);font-weight:900;color:var(--green2)}
.placar-carro.vencedor .placar-foto-wrap{border-color:var(--green);box-shadow:0 0 0 4px var(--green3)}
.placar-nome{font-family:var(--fh);font-weight:800;text-align:center;letter-spacing:-.02em;line-height:1.1}
.placar-carro.vencedor .placar-nome{color:var(--green)}
.placar-pts-num{font-family:var(--fh);font-size:3rem;font-weight:900;color:var(--green);letter-spacing:-.04em;line-height:1}
.placar-pts-label{font-family:var(--fm);font-size:.65rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.coroa{font-size:1.8rem;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empate-tag{background:var(--green3);border:1px solid var(--green4);color:var(--green2);font-family:var(--fm);font-size:.72rem;padding:.35rem .9rem;border-radius:100px}

/* ── BARRA DE NAVEGAÇÃO ───────────────────────────── */
.nav-bar{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1.5rem;
  background:#fff;border-top:1px solid var(--border);
  z-index:10;
}
.nav-logo{font-family:var(--fh);font-weight:800;font-size:.95rem;color:var(--green);display:flex;align-items:center;gap:.3rem}
.nav-logo-dot{width:6px;height:6px;border-radius:50%;background:var(--greenbright);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-centro{display:flex;align-items:center;gap:.75rem}
.nav-btn{
  background:none;border:1px solid var(--border);color:var(--text2);
  width:32px;height:32px;border-radius:50%;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.nav-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);background:var(--green3)}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}
.nav-dots{display:flex;gap:.3rem}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border);border:none;cursor:pointer;padding:0;transition:all .2s}
.nav-dot.on{background:var(--green);width:18px;border-radius:3px}
.nav-grupo-info{text-align:center}
.nav-grupo-n{font-family:var(--fm);font-size:.6rem;color:var(--text3);letter-spacing:.06em}
.nav-grupo-nome{font-family:var(--fh);font-size:.85rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
.nav-right{display:flex;align-items:center;gap:.75rem}
.nav-prox{
  background:var(--green);border:none;color:#fff;
  font-family:var(--fh);font-weight:600;font-size:.78rem;
  padding:.4rem 1rem;border-radius:100px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.nav-prox:hover{background:var(--green2)}
.nav-prox:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.nav-fechar{
  background:none;border:1px solid var(--border);color:var(--text3);
  width:30px;height:30px;border-radius:50%;font-size:.8rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.nav-fechar:hover{border-color:var(--red);color:var(--red)}

/* ── WRAPPER DE SLIDES ────────────────────────────── */
.slides-wrap{flex:1;position:relative;overflow:hidden}
</style>
</head>
<body>

<div class="slides-wrap" id="slides-wrap"></div>

<div class="nav-bar">
  <div class="nav-logo"><div class="nav-logo-dot"></div>SPCE</div>
  <div class="nav-centro">
    <button class="nav-btn" id="btn-prev" onclick="navGrupo(-1)" disabled>‹</button>
    <div>
      <div class="nav-dots" id="nav-dots"></div>
    </div>
    <button class="nav-btn" id="btn-next" onclick="navGrupo(1)">›</button>
  </div>
  <div class="nav-right">
    <div class="nav-grupo-info">
      <div class="nav-grupo-n" id="nav-n">SLIDE 1</div>
      <div class="nav-grupo-nome" id="nav-nome">Introdução</div>
    </div>
    <button class="nav-prox" id="btn-prox" onclick="navGrupo(1)">Próximo ›</button>
    <button class="nav-fechar" onclick="window.close()" title="Fechar">✕</button>
  </div>
</div>

<script>
let CARROS=[], atual=0, pontos=[]

const ICONES=['🏭','⚡','🛣️','🔌','📐','🛡️','🔒','💰']
const GRUPOS=[
  {n:'1',nome:'Fabricante',icone:'🏭',desc:'Origem e reputação da marca',criterios:[
    {l:'Nota Reclame Aqui',k:'reclame_aqui_nota',tp:'num',m:'maior',unid:'/10'},
    {l:'Fabricado em',k:'fabricado_em',tp:'txt'},
    {l:'Isenção PcD',k:'pcd_isencao',tp:'bool'},
  ]},
  {n:'2',nome:'Bateria e Motor',icone:'⚡',desc:'Capacidade e performance',criterios:[
    {l:'Bateria',k:'bateria_kwh',tp:'num',m:'maior',unid:'kWh'},
    {l:'Potência',k:'potencia_cv',tp:'num',m:'maior',unid:'cv'},
    {l:'Torque',k:'torque_kgfm',tp:'num',m:'maior',unid:'kgf.m'},
    {l:'0–100 km/h',k:'zero_100_s',tp:'num',m:'menor',unid:'seg'},
    {l:'Vel. máxima',k:'vel_max_kmh',tp:'num',m:'maior',unid:'km/h'},
    {l:'Tração',k:'tracao',tp:'txt'},
  ]},
  {n:'3',nome:'Autonomia',icone:'🛣️',desc:'Dados oficiais INMETRO',criterios:[
    {l:'Autonomia elétrica',k:'autonomia_km',tp:'num',m:'maior',unid:'km'},
    {l:'Consumo',k:'consumo_kmkwh',tp:'num',m:'maior',unid:'km/kWh'},
    {l:'Consumo cidade',k:'autonomia_hev_cidade',tp:'num',m:'maior',unid:'km/l'},
  ]},
  {n:'4',nome:'Recarga',icone:'🔌',desc:'Velocidade de carregamento',criterios:[
    {l:'Recarga AC',k:'recarga_ac_kw',tp:'num',m:'maior',unid:'kW'},
    {l:'Recarga DC',k:'recarga_dc_kw',tp:'num',m:'maior',unid:'kW'},
    {l:'DC 30→80%',k:'recarga_dc_tempo_min',tp:'num',m:'menor',unid:'min'},
    {l:'Protocolo DC',k:'protocolo_dc',tp:'txt'},
  ]},
  {n:'5',nome:'Dimensões',icone:'📐',desc:'Espaço e conforto',criterios:[
    {l:'Comprimento',k:'comprimento_mm_v',tp:'num',unid:'mm'},
    {l:'Porta-malas',k:'porta_malas_l',tp:'num',m:'maior',unid:'litros'},
    {l:'Frunk',k:'frunk_l',tp:'num',m:'maior',unid:'litros'},
    {l:'Peso',k:'peso_kg',tp:'num',m:'menor',unid:'kg'},
  ]},
  {n:'6',nome:'Segurança',icone:'🛡️',desc:'Proteção e assistência',criterios:[
    {l:'Airbags',k:'airbags_qtd',tp:'num',m:'maior',unid:'airbags'},
    {l:'Nível ADAS',k:'adas_nivel',tp:'txt'},
    {l:'HUD',k:'hud',tp:'txt'},
  ]},
  {n:'7',nome:'Garantias',icone:'🔒',desc:'Proteção do investimento',criterios:[
    {l:'Garantia veículo',k:'garantia_veiculo_anos',tp:'num',m:'maior',unid:'anos'},
    {l:'Garantia bateria',k:'garantia_bateria_anos',tp:'num',m:'maior',unid:'anos'},
  ]},
  {n:'$',nome:'Preço',icone:'💰',desc:'Valor de referência 0km',criterios:[
    {l:'Preço 0km',k:'preco_atual',tp:'preco',m:'menor',unid:'R$'},
  ]},
]

function fp(v){return v?'R$ '+Math.round(v).toLocaleString('pt-BR'):null}
function gi(m,mo){return((m||'')[0]+((mo||'')[0]||'')).toUpperCase()}

function initComparador(carros){
  CARROS=carros
  pontos=carros.map(()=>0)
  buildSlides()
  buildDots()
  irPara(0)
}

function buildSlides(){
  const wrap=document.getElementById('slides-wrap')
  wrap.innerHTML=''

  // Slide 0 — Capa
  const capa=document.createElement('div')
  capa.className='slide'
  capa.id='slide-0'
  capa.innerHTML=`
    <div class="capa">
      <div class="capa-vs">Comparativo SPCE</div>
      <div class="capa-carros">
        ${CARROS.map((d,i)=>[
          i===1?`<div class="vs-divider"><div class="vs-text">VS</div></div>`:''  ,
          `<div class="capa-carro">
            ${d.foto_principal
              ?`<img class="capa-foto" src="${d.foto_principal}" alt="${d.marca}">`
              :`<div class="capa-foto-ph">${gi(d.marca,d.modelo)}</div>`}
            <div class="capa-marca">${d.marca}</div>
            <div class="capa-modelo">${d.modelo}</div>
            <div class="capa-versao">${d.versao||''}</div>
            ${d.preco_atual?`<div class="capa-preco">${fp(d.preco_atual)}</div>`:''}
          </div>`
        ].join('')).join('')}
        ${CARROS.length===3?'':''}
      </div>
      <div class="capa-titulo">Use as setas para navegar pelos critérios de comparação</div>
      <div class="capa-hint">
        <span class="kbd">←</span><span class="kbd">→</span> navegar &nbsp;·&nbsp; <span class="kbd">ESC</span> fechar
      </div>
    </div>
  `
  wrap.appendChild(capa)

  // Slides de grupos
  GRUPOS.forEach((g,gi)=>{
    const div=document.createElement('div')
    div.className='slide criterio-slide'
    div.id=`slide-${gi+1}`

    // Calcular vencedor
    const vencedores=CARROS.map(()=>false)
    const temDados=CARROS.map(d=>{
      const v=d[g.criterios[0]?.k]
      return v!==null&&v!==undefined&&v!==''
    })

    // Header
    const headerHTML=`<div class="crit-header">
      ${CARROS.map((d,i)=>`
        <div class="crit-car">
          ${d.foto_principal
            ?`<img class="crit-car-foto" src="${d.foto_principal}" alt="${d.marca}">`
            :`<div class="crit-car-foto-ph">${gi(d.marca,d.modelo)}</div>`}
          <div class="crit-car-info">
            <div class="crit-car-marca">${d.marca}</div>
            <div class="crit-car-nome">${d.modelo}</div>
            <div class="crit-car-ver">${d.versao||''}</div>
          </div>
          <div class="crit-car-pts" id="g${gi}-pts-${i}">0 pts</div>
        </div>
      `).join('')}
    </div>`

    // Calcular melhor/pior por critério
    const critRows=g.criterios.map(f=>{
      const vals=CARROS.map(d=>d[f.k])
      const temAlgum=vals.some(v=>v!==null&&v!==undefined&&v!=='')
      if(!temAlgum) return null
      let bi=-1,wi=-1
      if((f.tp==='num'||f.tp==='preco')&&f.m){
        const ns=vals.map(v=>parseFloat(v)||null)
        const vl=ns.filter(v=>v!==null)
        if(vl.length>1){
          const bv=f.m==='maior'?Math.max(...vl):Math.min(...vl)
          const wv=f.m==='maior'?Math.min(...vl):Math.max(...vl)
          bi=ns.indexOf(bv);wi=ns.indexOf(wv)
          if(bi===wi)wi=-1
        }
      }
      return {f,vals,bi,wi}
    }).filter(Boolean)

    // Corpo
    const dadosHTML=CARROS.map((d,ci)=>{
      // Contar quantos critérios este carro vence neste grupo
      let vence=0
      critRows.forEach(({bi})=>{if(bi===ci)vence++})

      const rows=critRows.map(({f,vals,bi,wi})=>{
        const v=vals[ci]
        const disp=v===null||v===undefined||v===''?null
          :f.tp==='preco'?fp(v)
          :f.tp==='bool'?(v?'✓ Sim':'Não')
          :f.tp==='num'?Number(v).toLocaleString('pt-BR')
          :v
        if(!disp) return ''
        const cls=ci===bi?'destaque':ci===wi?'pior':''
        const isGrande=f.tp==='num'||f.tp==='preco'
        const isTxt=f.tp==='txt'||f.tp==='bool'
        // Tamanho da fonte baseado no número de dígitos
        const numStr=disp.replace(/[^0-9]/g,'')
        const tamFonte=numStr.length>5?'pequeno':''
        return `<div class="dado-item">
          <div class="dado-val ${cls} ${isTxt?'txt':''} ${tamFonte}">${disp}</div>
          ${f.unid&&!isTxt?`<div class="dado-unid">${f.unid}</div>`:''}
          <div class="dado-label">${f.l}</div>
        </div><div class="dado-sep"></div>`
      }).join('')

      return`<div class="crit-dado-col${vence>0?' vencedor':''}" id="g${gi}-col-${ci}">
        ${rows}
        ${vence>0?`<div class="badge-venc">✓ melhor neste critério</div>`:''}
      </div>`
    }).join('')

    div.innerHTML=`
      ${headerHTML}
      <div class="crit-body">
        <div class="crit-painel">
          <div class="crit-painel-num">CRITÉRIO ${g.n}</div>
          <div class="crit-painel-icone">${g.icone}</div>
          <div class="crit-painel-nome">${g.nome}</div>
          <div class="crit-painel-desc">${g.desc}</div>
        </div>
        <div style="flex:1;display:grid;grid-template-columns:repeat(${CARROS.length},1fr)">
          ${dadosHTML}
        </div>
      </div>
    `
    wrap.appendChild(div)
  })

  // Slide placar final
  const placar=document.createElement('div')
  placar.className='slide'
  placar.id=`slide-${GRUPOS.length+1}`
  placar.innerHTML=`<div class="placar-slide" id="placar-final"></div>`
  wrap.appendChild(placar)
}

function calcularPontos(){
  pontos=CARROS.map(()=>0)
  GRUPOS.forEach(g=>{
    g.criterios.forEach(f=>{
      if(!(f.tp==='num'||f.tp==='preco')||!f.m) return
      const vals=CARROS.map(d=>parseFloat(d[f.k])||null)
      const vl=vals.filter(v=>v!==null)
      if(vl.length<2) return
      const bv=f.m==='maior'?Math.max(...vl):Math.min(...vl)
      const bi=vals.indexOf(bv)
      if(bi>=0) pontos[bi]++
    })
  })
  // Atualizar placares no header de cada slide
  GRUPOS.forEach((g,gi)=>{
    CARROS.forEach((_,ci)=>{
      const el=document.getElementById(`g${gi}-pts-${ci}`)
      if(el) el.textContent=`${pontos[ci]} pts`
    })
  })
}

function renderPlacarFinal(){
  const maxPts=Math.max(...pontos)
  const vencedores=pontos.map((p,i)=>p===maxPts?i:-1).filter(i=>i>=0)
  const empate=vencedores.length>1
  const pf=document.getElementById('placar-final')
  if(!pf) return
  pf.innerHTML=`
    <div class="placar-titulo">🏁 Resultado Final</div>
    ${empate?`<div class="empate-tag">🤝 Empate técnico</div>`:''}
    <div class="placar-carros">
      ${CARROS.map((d,i)=>{
        const isVenc=!empate&&vencedores.includes(i)
        const larg=isVenc?220:170
        const alt=isVenc?130:100
        return`<div class="placar-carro${isVenc?' vencedor':''}">
          ${isVenc?'<div class="coroa">👑</div>':'<div style="height:30px"></div>'}
          <div class="placar-foto-wrap" style="width:${larg}px;height:${alt}px">
            ${d.foto_principal
              ?`<img src="${d.foto_principal}" style="width:100%;height:100%;object-fit:contain">`
              :`<div class="placar-foto-ph" style="width:${larg}px;height:${alt}px;font-size:${isVenc?'2.5rem':'2rem'}">${gi(d.marca,d.modelo)}</div>`}
          </div>
          <div class="placar-nome" style="font-size:${isVenc?'1rem':'.85rem'};max-width:${larg}px">
            ${d.marca} ${d.modelo}<br><span style="font-weight:400;color:var(--text3);font-size:.8em">${d.versao||''}</span>
          </div>
          <div class="placar-pts-num">${pontos[i]}</div>
          <div class="placar-pts-label">critérios vencidos</div>
        </div>`
      }).join('')}
    </div>
  `
}

function buildDots(){
  const total=GRUPOS.length+2 // capa + grupos + placar
  document.getElementById('nav-dots').innerHTML=
    Array.from({length:total},(_,i)=>
      `<button class="nav-dot${i===0?' on':''}" onclick="irPara(${i})"></button>`
    ).join('')
}

function irPara(idx){
  const total=GRUPOS.length+2
  if(idx<0||idx>=total) return

  if(idx===GRUPOS.length+1){calcularPontos();renderPlacarFinal()}

  const ant=document.querySelector('.slide.active')
  if(ant){ant.classList.remove('active');ant.classList.add('exit');setTimeout(()=>ant.classList.remove('exit'),400)}
  setTimeout(()=>{
    const novo=document.getElementById(`slide-${idx}`)
    if(novo) novo.classList.add('active')
  },50)

  atual=idx
  const isCapa=idx===0
  const isPlacar=idx===GRUPOS.length+1
  document.getElementById('nav-n').textContent=
    isCapa?'INTRODUÇÃO':isPlacar?'RESULTADO':
    `GRUPO ${GRUPOS[idx-1].n} DE ${GRUPOS.length}`
  document.getElementById('nav-nome').textContent=
    isCapa?'Comparativo':isPlacar?'🏆 Placar Final':GRUPOS[idx-1].nome
  document.getElementById('btn-prev').disabled=idx===0
  document.getElementById('btn-next').disabled=idx===total-1
  document.getElementById('btn-prox').disabled=idx===total-1
  document.getElementById('btn-prox').textContent=
    idx===total-2?'🏆 Ver Placar ›':'Próximo ›'
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('on',i===idx))
}

function navGrupo(dir){irPara(atual+dir)}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') navGrupo(1)
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') navGrupo(-1)
  if(e.key==='Escape') window.close()
})
