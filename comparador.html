<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPCE — Comparador</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#16a34a;--green2:#15803d;--greenbright:#22c55e;--greenneon:#4ade80;
  --teal:#06b6d4;--text:#0a1a0f;--text2:#2d5a3a;--text3:#7a9e82;
  --fh:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#f0f7f2;
  background-image:
    radial-gradient(ellipse 70% 60% at 100% 0%,rgba(6,182,212,.12) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 0% 100%,rgba(34,197,94,.08) 0%,transparent 50%);
  font-family:var(--fh);
  display:flex;flex-direction:column;
}

/* ── SLIDES ─────────────────────────────────── */
.slides-wrap{flex:1;position:relative;overflow:hidden}
.slide{
  position:absolute;inset:0;
  opacity:0;transform:translateX(80px);
  transition:opacity .45s ease,transform .45s cubic-bezier(.4,0,.2,1);
  pointer-events:none;display:flex;flex-direction:column;
}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateX(-80px)}

/* ── LAYOUT BASE DE CADA SLIDE ───────────────── */
/* Topo: fotos dos carros */
.cars-top{
  flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;
  padding:1.2rem 2rem 0;gap:3rem;
}
.car-top{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.car-top-foto{
  height:140px;max-width:280px;
  object-fit:contain;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.15));
}
.car-top-foto-ph{
  height:140px;width:240px;
  background:linear-gradient(135deg,#dcfce7,#bbf7d0);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:3rem;font-weight:900;color:var(--green2);
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.1));
}
.car-top-marca{font-family:var(--fh);font-size:.85rem;font-weight:700;color:var(--text2);letter-spacing:-.01em}
.car-top-modelo{font-family:var(--fh);font-size:1.1rem;font-weight:900;color:var(--text);letter-spacing:-.03em;line-height:1}
.car-top-versao{font-family:var(--fm);font-size:.65rem;color:var(--greenbright);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.car-top-pts{font-family:var(--fm);font-size:.65rem;color:var(--text3);margin-top:.1rem}

/* Área de conteúdo: painel + dados */
.crit-area{
  flex:1;display:flex;align-items:center;
  padding:1rem 2rem 0;gap:1.5rem;
  overflow:hidden;
  position:relative;
}

/* Painel lateral — forma de seta/play */
.painel{
  flex-shrink:0;width:180px;
  background:linear-gradient(160deg,var(--greenbright) 0%,var(--teal) 100%);
  border-radius:0 60px 60px 0;
  clip-path:polygon(0 0,75% 0,100% 50%,75% 100%,0 100%);
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  padding:2rem 2.5rem 2rem 1.5rem;gap:.6rem;
  min-height:220px;
}
.painel-num{font-family:var(--fm);font-size:.6rem;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.1em;text-transform:uppercase}
.painel-icone{font-size:2rem;line-height:1}
.painel-nome{font-family:var(--fh);font-size:.95rem;font-weight:900;color:#fff;text-transform:uppercase;line-height:1.15;letter-spacing:-.01em}
.painel-desc{font-size:.68rem;color:rgba(255,255,255,.75);line-height:1.4;max-width:120px}

/* Área dos números */
.dados-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  gap:0;
}
.dado-col{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1rem;gap:.5rem;
  border-right:1px solid rgba(0,0,0,.06);
}
.dado-col:last-child{border-right:none}
.dado-col.vencedor{position:relative}
.dado-col.vencedor::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;
  height:3px;background:var(--greenbright);border-radius:2px;
}

/* Sub-critérios dentro de uma coluna */
.sub-crit{width:100%;text-align:center;margin-bottom:.8rem}
.sub-crit:last-child{margin-bottom:0}
.sub-label{
  font-family:var(--fm);font-size:.62rem;font-weight:500;
  color:var(--text3);letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:.2rem;
}
.num-grande{
  font-family:var(--fh);font-weight:900;
  color:var(--text);letter-spacing:-.04em;line-height:.9;
  transition:color .3s;
}
.num-grande.destaque{color:var(--green)}
.num-grande.pior{color:#dc2626}
.num-grande.neon{color:var(--greenneon)}
.num-unid{
  font-family:var(--fm);font-size:.7rem;font-weight:500;
  color:var(--text3);letter-spacing:.06em;text-transform:uppercase;
  margin-top:.2rem;
}
.num-grande.size-xl{font-size:5rem}
.num-grande.size-lg{font-size:3.5rem}
.num-grande.size-md{font-size:2.5rem}
.num-grande.size-sm{font-size:1.8rem}
.num-grande.size-txt{font-size:1.3rem;font-weight:700;letter-spacing:-.02em}

/* Separador entre sub-critérios */
.sub-sep{width:30px;height:1px;background:rgba(0,0,0,.08);margin:.5rem auto}

/* Logo SPCE — canto inferior direito */
.logo-spce{
  position:absolute;bottom:1rem;right:1.5rem;
  font-family:var(--fh);font-size:.75rem;font-weight:800;
  color:var(--text3);letter-spacing:.04em;display:flex;align-items:center;gap:.3rem;
  opacity:.5;
}
.logo-dot{width:5px;height:5px;border-radius:50%;background:var(--greenbright)}

/* ── SLIDE CAPA ───────────────────────────────── */
.capa-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;
  padding:2rem;
}
.capa-tag{
  font-family:var(--fm);font-size:.7rem;font-weight:700;
  color:var(--text3);letter-spacing:.2em;text-transform:uppercase;
}
.capa-carros{
  display:flex;align-items:flex-end;justify-content:center;gap:1rem;width:100%;max-width:860px;
}
.capa-carro{flex:1;display:flex;flex-direction:column;align-items:center;gap:.4rem}
.capa-foto{width:100%;max-width:320px;height:170px;object-fit:contain;filter:drop-shadow(0 12px 32px rgba(0,0,0,.15))}
.capa-foto-ph{width:260px;height:170px;background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;font-weight:900;color:var(--green2)}
.capa-modelo{font-family:var(--fh);font-size:1.5rem;font-weight:900;color:var(--text);letter-spacing:-.03em}
.capa-versao{font-family:var(--fm);font-size:.65rem;color:var(--greenbright);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.capa-preco{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--green)}
.vs-box{display:flex;flex-direction:column;align-items:center;gap:.3rem;padding:0 .5rem;flex-shrink:0}
.vs-txt{font-family:var(--fh);font-size:2.5rem;font-weight:900;color:var(--green);letter-spacing:-.04em}
.capa-hint{font-family:var(--fm);font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:.4rem;margin-top:.5rem}
.kbd{background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:5px;padding:.12rem .4rem;font-size:.62rem;box-shadow:0 1px 2px rgba(0,0,0,.08)}

/* ── SLIDE PLACAR ─────────────────────────────── */
.placar-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;padding:2rem;
}
.placar-tag{font-family:var(--fm);font-size:.72rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.placar-carros{display:flex;align-items:flex-end;gap:3rem;justify-content:center}
.placar-carro{display:flex;flex-direction:column;align-items:center;gap:.65rem}
.placar-foto{border-radius:16px;overflow:hidden;border:2px solid rgba(0,0,0,.06);background:#fff}
.placar-foto img{display:block;width:100%;height:100%;object-fit:contain}
.placar-foto-ph{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#dcfce7,#bbf7d0);font-family:var(--fh);font-weight:900;color:var(--green2)}
.placar-carro.vencedor .placar-foto{border-color:var(--greenbright);box-shadow:0 0 0 4px rgba(34,197,94,.2)}
.placar-carro-nome{font-family:var(--fh);font-weight:800;text-align:center;letter-spacing:-.02em;line-height:1.1;color:var(--text)}
.placar-carro.vencedor .placar-carro-nome{color:var(--green)}
.placar-pts{font-family:var(--fh);font-size:3.5rem;font-weight:900;color:var(--green);letter-spacing:-.04em;line-height:1}
.placar-pts-lbl{font-family:var(--fm);font-size:.62rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.coroa{font-size:1.8rem;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empate-tag{background:#dcfce7;border:1px solid #bbf7d0;color:var(--green2);font-family:var(--fm);font-size:.7rem;padding:.3rem .8rem;border-radius:100px}

/* ── BARRA NAVEGAÇÃO ──────────────────────────── */
.nav-bar{
  flex-shrink:0;background:#fff;border-top:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem 1.5rem;
  box-shadow:0 -1px 8px rgba(0,0,0,.05);
}
.nav-logo{font-family:var(--fh);font-weight:800;font-size:.9rem;color:var(--green);display:flex;align-items:center;gap:.3rem}
.nav-logo-dot{width:6px;height:6px;border-radius:50%;background:var(--greenbright);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-centro{display:flex;align-items:center;gap:.65rem}
.nav-btn{background:none;border:1px solid rgba(0,0,0,.12);color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.nav-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);background:#dcfce7}
.nav-btn:disabled{opacity:.2;cursor:not-allowed}
.nav-dots{display:flex;gap:.28rem}
.nav-dot{width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,.15);border:none;cursor:pointer;padding:0;transition:all .2s}
.nav-dot.on{background:var(--green);width:16px;border-radius:3px}
.nav-info{text-align:center}
.nav-info-n{font-family:var(--fm);font-size:.58rem;color:var(--text3);letter-spacing:.06em}
.nav-info-nome{font-family:var(--fh);font-size:.8rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.nav-right{display:flex;align-items:center;gap:.6rem}
.btn-prox{background:var(--green);border:none;color:#fff;font-family:var(--fh);font-weight:700;font-size:.75rem;padding:.38rem .95rem;border-radius:100px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-prox:hover{background:var(--green2)}
.btn-prox:disabled{background:rgba(0,0,0,.1);color:var(--text3);cursor:not-allowed}
.btn-fechar{background:none;border:1px solid rgba(0,0,0,.12);color:var(--text3);width:28px;height:28px;border-radius:50%;font-size:.78rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-fechar:hover{border-color:#dc2626;color:#dc2626}
</style>
</head>
<body>

<div class="slides-wrap" id="slides-wrap"></div>

<div class="nav-bar">
  <div class="nav-logo"><div class="nav-logo-dot"></div>SPCE</div>
  <div class="nav-centro">
    <button class="nav-btn" id="btn-prev" onclick="navGrupo(-1)" disabled>‹</button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="nav-btn" id="btn-next" onclick="navGrupo(1)">›</button>
  </div>
  <div class="nav-right">
    <div class="nav-info">
      <div class="nav-info-n" id="nav-n">INTRODUÇÃO</div>
      <div class="nav-info-nome" id="nav-nome">Comparativo</div>
    </div>
    <button class="btn-prox" id="btn-prox" onclick="navGrupo(1)">Próximo ›</button>
    <button class="btn-fechar" onclick="window.close()">✕</button>
  </div>
</div>

<script>
let CARROS=[], atual=0, pontos=[]

const GRUPOS=[
  {n:'1',nome:'Fabricante',icone:'🏭',desc:'Reputação da marca',criterios:[
    {l:'Nota Reclame Aqui',k:'reclame_aqui_nota',tp:'num',m:'maior',unid:'/10'},
    {l:'Fabricado em',k:'fabricado_em',tp:'txt'},
    {l:'Isenção PcD',k:'pcd_isencao',tp:'bool'},
  ]},
  {n:'2',nome:'Bateria e Motor',icone:'⚡',desc:'Capacidade e performance',criterios:[
    {l:'Bateria',k:'bateria_kwh',tp:'num',m:'maior',unid:'kWh'},
    {l:'Potência',k:'potencia_cv',tp:'num',m:'maior',unid:'cv'},
    {l:'Torque',k:'torque_kgfm',tp:'num',m:'maior',unid:'kgf.m'},
    {l:'0–100 km/h',k:'zero_100_s',tp:'num',m:'menor',unid:'seg',neon:true},
    {l:'Vel. máxima',k:'vel_max_kmh',tp:'num',m:'maior',unid:'km/h',neon:true},
    {l:'Tração',k:'tracao',tp:'txt'},
  ]},
  {n:'3',nome:'Autonomia',icone:'🛣️',desc:'Dados oficiais INMETRO',criterios:[
    {l:'Autonomia elétrica',k:'autonomia_km',tp:'num',m:'maior',unid:'km'},
    {l:'Consumo',k:'consumo_kmkwh',tp:'num',m:'maior',unid:'km/kWh'},
    {l:'Consumo cidade HEV',k:'autonomia_hev_cidade',tp:'num',m:'maior',unid:'km/l'},
  ]},
  {n:'4',nome:'Recarga',icone:'🔌',desc:'Velocidade de carregamento',criterios:[
    {l:'AC — Lenta',k:'recarga_ac_kw',tp:'num',m:'maior',unid:'kW'},
    {l:'DC — Rápida',k:'recarga_dc_kw',tp:'num',m:'maior',unid:'kW'},
    {l:'DC 30→80%',k:'recarga_dc_tempo_min',tp:'num',m:'menor',unid:'min',neon:true},
    {l:'Protocolo',k:'protocolo_dc',tp:'txt'},
  ]},
  {n:'5',nome:'Dimensões',icone:'📐',desc:'Espaço e conforto',criterios:[
    {l:'Comprimento',k:'comprimento_mm_v',tp:'num',unid:'mm'},
    {l:'Porta-malas',k:'porta_malas_l',tp:'num',m:'maior',unid:'litros'},
    {l:'Frunk',k:'frunk_l',tp:'num',m:'maior',unid:'litros'},
    {l:'Peso',k:'peso_kg',tp:'num',m:'menor',unid:'kg'},
  ]},
  {n:'6',nome:'Segurança',icone:'🛡️',desc:'Proteção e assistência',criterios:[
    {l:'Airbags',k:'airbags_qtd',tp:'num',m:'maior',unid:'airbags'},
    {l:'Nível ADAS',k:'adas_nivel',tp:'txt'},
    {l:'HUD',k:'hud',tp:'txt'},
  ]},
  {n:'7',nome:'Garantias',icone:'🔒',desc:'Proteção do investimento',criterios:[
    {l:'Garantia veículo',k:'garantia_veiculo_anos',tp:'num',m:'maior',unid:'anos'},
    {l:'Garantia bateria',k:'garantia_bateria_anos',tp:'num',m:'maior',unid:'anos'},
  ]},
  {n:'$',nome:'Preço',icone:'💰',desc:'Valor de referência 0km',criterios:[
    {l:'Preço 0km',k:'preco_atual',tp:'preco',m:'menor'},
  ]},
]

function fp(v){return v?'R$ '+Math.round(v).toLocaleString('pt-BR'):null}
function gi(m,mo){return((m||'')[0]+((mo||'')[0]||'')).toUpperCase()}

function tamFonte(val,tp){
  if(tp==='txt'||tp==='bool') return 'size-txt'
  if(tp==='preco') return 'size-md'
  const s=String(val).replace(/[^0-9,.]/g,'')
  if(s.length<=3) return 'size-xl'
  if(s.length<=5) return 'size-lg'
  if(s.length<=7) return 'size-md'
  return 'size-sm'
}

function formatVal(v,f){
  if(v===null||v===undefined||v==='') return null
  if(f.tp==='preco') return fp(v)
  if(f.tp==='bool') return v?'✓ Sim':'Não'
  if(f.tp==='num') return Number(v).toLocaleString('pt-BR')
  return v
}

function initComparador(carros){
  CARROS=carros
  pontos=carros.map(()=>0)
  buildSlides()
  buildDots()
  irPara(0)
}

function buildSlides(){
  const wrap=document.getElementById('slides-wrap')
  wrap.innerHTML=''

  // ── Slide 0: Capa ──
  const capa=document.createElement('div')
  capa.className='slide'; capa.id='slide-0'
  capa.innerHTML=`<div class="capa-wrap">
    <div class="capa-tag">⚡ Comparativo SPCE</div>
    <div class="capa-carros">
      ${CARROS.map((d,i)=>`
        ${i===1?`<div class="vs-box"><div class="vs-txt">VS</div></div>`:''}
        ${i===2?`<div class="vs-box"><div class="vs-txt">VS</div></div>`:''}
        <div class="capa-carro">
          ${d.foto_principal
            ?`<img class="capa-foto" src="${d.foto_principal}" alt="${d.marca}">`
            :`<div class="capa-foto-ph">${gi(d.marca,d.modelo)}</div>`}
          <div class="capa-modelo">${d.marca} ${d.modelo}</div>
          <div class="capa-versao">${d.versao||''}</div>
          ${d.preco_atual?`<div class="capa-preco">${fp(d.preco_atual)}</div>`:''}
        </div>
      `).join('')}
    </div>
    <div class="capa-hint">
      <span class="kbd">←</span><span class="kbd">→</span> navegar &nbsp;·&nbsp;
      <span class="kbd">ESC</span> fechar
    </div>
  </div>
  <div class="logo-spce"><div class="logo-dot"></div>SPCE</div>`
  wrap.appendChild(capa)

  // ── Slides de grupos ──
  GRUPOS.forEach((g,gi)=>{
    const div=document.createElement('div')
    div.className='slide'; div.id=`slide-${gi+1}`

    // Calcular melhor/pior por critério
    const critCalc=g.criterios.map(f=>{
      const vals=CARROS.map(d=>d[f.k])
      let bi=-1,wi=-1
      if((f.tp==='num'||f.tp==='preco')&&f.m){
        const ns=vals.map(v=>parseFloat(v)||null)
        const vl=ns.filter(v=>v!==null)
        if(vl.length>1){
          const bv=f.m==='maior'?Math.max(...vl):Math.min(...vl)
          const wv=f.m==='maior'?Math.min(...vl):Math.max(...vl)
          bi=ns.indexOf(bv); wi=ns.indexOf(wv)
          if(bi===wi)wi=-1
        }
      }
      return{f,vals,bi,wi}
    })

    // Fotos topo
    const carsTopHTML=`<div class="cars-top">
      ${CARROS.map((d,ci)=>`
        <div class="car-top">
          ${d.foto_principal
            ?`<img class="car-top-foto" src="${d.foto_principal}" alt="${d.marca}">`
            :`<div class="car-top-foto-ph">${gi(d.marca,d.modelo)}</div>`}
          <div class="car-top-marca">${d.marca}</div>
          <div class="car-top-modelo">${d.modelo}</div>
          <div class="car-top-versao">${d.versao||''}</div>
          <div class="car-top-pts" id="g${gi}-pts-${ci}">0 pts</div>
        </div>
      `).join('')}
    </div>`

    // Colunas de dados por carro
    const dadosColsHTML=CARROS.map((d,ci)=>{
      let venceAlgum=critCalc.some(({bi})=>bi===ci)
      const rows=critCalc.map(({f,vals,bi,wi})=>{
        const v=vals[ci]
        const disp=formatVal(v,f)
        if(!disp) return ''
        const isDestaque=ci===bi
        const isPior=ci===wi
        const isNeon=f.neon&&isDestaque
        const cls=isNeon?'neon':isDestaque?'destaque':isPior?'pior':''
        const tam=tamFonte(disp,f.tp)
        return`<div class="sub-crit">
          <div class="sub-label">${f.l}</div>
          <div class="num-grande ${tam} ${cls}">${disp}</div>
          ${f.unid&&(f.tp==='num')?`<div class="num-unid">${f.unid}</div>`:''}
        </div><div class="sub-sep"></div>`
      }).join('')
      return`<div class="dado-col${venceAlgum?' vencedor':''}" id="g${gi}-col-${ci}">${rows}</div>`
    }).join('')

    div.innerHTML=`
      ${carsTopHTML}
      <div class="crit-area">
        <div class="painel">
          <div class="painel-num">CRITÉRIO ${g.n}</div>
          <div class="painel-icone">${g.icone}</div>
          <div class="painel-nome">${g.nome}</div>
          <div class="painel-desc">${g.desc}</div>
        </div>
        <div class="dados-area" style="grid-template-columns:repeat(${CARROS.length},1fr)">
          ${dadosColsHTML}
        </div>
      </div>
      <div class="logo-spce"><div class="logo-dot"></div>SPCE</div>
    `
    wrap.appendChild(div)
  })

  // ── Slide placar final ──
  const placar=document.createElement('div')
  placar.className='slide'; placar.id=`slide-${GRUPOS.length+1}`
  placar.innerHTML=`<div class="placar-wrap" id="placar-final"></div>
  <div class="logo-spce"><div class="logo-dot"></div>SPCE</div>`
  wrap.appendChild(placar)
}

function calcularPontos(){
  pontos=CARROS.map(()=>0)
  GRUPOS.forEach(g=>{
    g.criterios.forEach(f=>{
      if(!(f.tp==='num'||f.tp==='preco')||!f.m) return
      const vals=CARROS.map(d=>parseFloat(d[f.k])||null)
      const vl=vals.filter(v=>v!==null)
      if(vl.length<2) return
      const bv=f.m==='maior'?Math.max(...vl):Math.min(...vl)
      const bi=vals.indexOf(bv)
      if(bi>=0) pontos[bi]++
    })
  })
  GRUPOS.forEach((g,gi)=>{
    CARROS.forEach((_,ci)=>{
      const el=document.getElementById(`g${gi}-pts-${ci}`)
      if(el) el.textContent=`${pontos[ci]} pts`
    })
  })
}

function renderPlacarFinal(){
  const maxPts=Math.max(...pontos)
  const vencedores=pontos.map((p,i)=>p===maxPts?i:-1).filter(i=>i>=0)
  const empate=vencedores.length>1
  const pf=document.getElementById('placar-final')
  if(!pf) return
  pf.innerHTML=`
    <div class="placar-tag">🏁 Resultado Final</div>
    ${empate?`<div class="empate-tag">🤝 Empate técnico</div>`:''}
    <div class="placar-carros">
      ${CARROS.map((d,i)=>{
        const isVenc=!empate&&vencedores.includes(i)
        const larg=isVenc?210:170; const alt=isVenc?125:100
        return`<div class="placar-carro${isVenc?' vencedor':''}">
          ${isVenc?'<div class="coroa">👑</div>':'<div style="height:28px"></div>'}
          <div class="placar-foto" style="width:${larg}px;height:${alt}px">
            ${d.foto_principal
              ?`<img src="${d.foto_principal}" style="width:100%;height:100%;object-fit:contain">`
              :`<div class="placar-foto-ph" style="width:${larg}px;height:${alt}px;font-size:${isVenc?'2.5rem':'2rem'}">${gi(d.marca,d.modelo)}</div>`}
          </div>
          <div class="placar-carro-nome" style="font-size:${isVenc?'.95rem':'.8rem'};max-width:${larg}px">
            ${d.marca} ${d.modelo}<br><span style="font-weight:400;color:var(--text3);font-size:.85em">${d.versao||''}</span>
          </div>
          <div class="placar-pts">${pontos[i]}</div>
          <div class="placar-pts-lbl">critérios</div>
        </div>`
      }).join('')}
    </div>
  `
}

function buildDots(){
  const total=GRUPOS.length+2
  document.getElementById('nav-dots').innerHTML=
    Array.from({length:total},(_,i)=>
      `<button class="nav-dot${i===0?' on':''}" onclick="irPara(${i})"></button>`
    ).join('')
}

function irPara(idx){
  const total=GRUPOS.length+2
  if(idx<0||idx>=total) return
  if(idx===GRUPOS.length+1){calcularPontos();renderPlacarFinal()}
  const ant=document.querySelector('.slide.active')
  if(ant){ant.classList.remove('active');ant.classList.add('exit');setTimeout(()=>ant.classList.remove('exit'),450)}
  setTimeout(()=>{const novo=document.getElementById(`slide-${idx}`);if(novo)novo.classList.add('active')},50)
  atual=idx
  const isCapa=idx===0, isPlacar=idx===GRUPOS.length+1
  document.getElementById('nav-n').textContent=isCapa?'INTRODUÇÃO':isPlacar?'RESULTADO':`CRITÉRIO ${GRUPOS[idx-1].n}`
  document.getElementById('nav-nome').textContent=isCapa?'Comparativo':isPlacar?'🏆 Placar Final':GRUPOS[idx-1].nome
  document.getElementById('btn-prev').disabled=idx===0
  document.getElementById('btn-next').disabled=idx===total-1
  document.getElementById('btn-prox').disabled=idx===total-1
  document.getElementById('btn-prox').textContent=idx===total-2?'🏆 Ver Placar ›':'Próximo ›'
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('on',i===idx))
}
function navGrupo(dir){irPara(atual+dir)}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') navGrupo(1)
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') navGrupo(-1)
  if(e.key==='Escape') window.close()
})
